# Render Blueprint when Git repo root is THIS folder (parent of `travelinsta/`).
# Build context = ./travelinsta (Dockerfile + app code there).
services:
  - type: worker
    name: travelinsta-bot
    runtime: docker
    dockerfilePath: ./travelinsta/Dockerfile
    dockerContext: ./travelinsta
    plan: free
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_CHAT_IDS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
